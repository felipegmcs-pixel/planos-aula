<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Logo Circular Geométrica do ProfessorIA (Branca) -->
  <!-- Círculo externo (Branco) -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Círculos internos (Geometria Sagrada - Vesica Piscis) -->
  <circle cx="35" cy="50" r="20" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
  <circle cx="65" cy="50" r="20" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Ponto central (Intuição/Conexão) -->
  <circle cx="50" cy="50" r="3" fill="#ffffff"/>
  
  <!-- Linhas de energia (Triângulo sagrado) -->
  <path d="M 50 25 L 35 65 L 65 65 Z" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Pequenos pontos nos vértices -->
  <circle cx="50" cy="25" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="35" cy="65" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="65" cy="65" r="2" fill="#ffffff" opacity="0.7"/>
</svg>
