<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- ProfessorIA — Logo Ancestral: Mãe e Filho Conectados (Branco) -->
  <g fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cabeça da mãe (círculo maior, superior esquerdo) -->
    <circle cx="35" cy="28" r="10" />
    <!-- Corpo da mãe (linha vertical) -->
    <path d="M 35 38 L 35 55" />
    <!-- Braço esquerdo da mãe (abraço) -->
    <path d="M 35 42 Q 20 45 18 55" />
    <!-- Braço direito da mãe (abraço) -->
    <path d="M 35 42 Q 50 45 52 55" />
    
    <!-- Cabeça do filho (círculo menor, inferior direito) -->
    <circle cx="60" cy="50" r="7" />
    <!-- Corpo do filho (linha vertical) -->
    <path d="M 60 57 L 60 70" />
    <!-- Braço do filho (conexão com mãe) -->
    <path d="M 60 60 Q 48 58 42 52" />
    
    <!-- Linha de conexão/energia (nó celta minimalista) -->
    <path d="M 45 48 Q 50 45 55 48" />
    
    <!-- Ponto central de intuição (coração/conexão) -->
    <circle cx="50" cy="50" r="2" fill="#ffffff" />
  </g>
</svg>
