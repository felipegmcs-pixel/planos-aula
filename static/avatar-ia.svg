<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" fill="none">
  <!-- Circle background — deep black -->
  <circle cx="18" cy="18" r="18" fill="#0a0a0a"/>

  <!-- Subtle ring -->
  <circle cx="18" cy="18" r="17" stroke="#f5f4f0" stroke-width="0.5" opacity="0.15"/>

  <!-- Diagonal line -->
  <line x1="0" y1="36" x2="36" y2="0" stroke="#f5f4f0" stroke-width="0.35" opacity="0.1"/>

  <!-- P mark centered: stem -->
  <rect x="8" y="9" width="4.5" height="18" fill="#f5f4f0"/>

  <!-- P mark: open bowl -->
  <path d="M12.5 9 Q22 9 22 14.5 Q22 20 12.5 20"
        fill="none"
        stroke="#f5f4f0"
        stroke-width="4.5"
        stroke-linecap="square"/>

  <!-- IA tag bottom right -->
  <text x="27" y="30"
        font-family="Arial,Helvetica,sans-serif"
        font-size="5.5"
        font-weight="900"
        fill="#f5f4f0"
        opacity="0.85"
        text-anchor="middle"
        letter-spacing="-0.3">IA</text>
</svg>
