<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" fill="none">
  <rect width="220" height="64" fill="#0a0a0a"/>

  <!-- Diagonal -->
  <line x1="0" y1="64" x2="220" y2="0" stroke="#f5f4f0" stroke-width="0.5" opacity="0.08"/>

  <!-- "PROFESSOR" — weight 300, wide tracking, whisper -->
  <text x="14" y="26"
        font-family="Arial,Helvetica,sans-serif"
        font-size="11"
        font-weight="300"
        fill="#f5f4f0"
        opacity="0.7"
        letter-spacing="5.5">PROFESSOR</text>

  <!-- Thin rule -->
  <rect x="14" y="31" width="192" height="0.6" fill="#f5f4f0" opacity="0.2"/>

  <!-- "IA" — weight 900, massive, LOUD -->
  <text x="12" y="58"
        font-family="Arial,Helvetica,sans-serif"
        font-size="38"
        font-weight="900"
        fill="#f5f4f0"
        letter-spacing="-3">IA</text>

  <!-- "c/o BRAZIL" small tag — Abloh provenance detail -->
  <text x="88" y="57"
        font-family="Arial,Helvetica,sans-serif"
        font-size="7.5"
        font-weight="400"
        fill="#f5f4f0"
        opacity="0.35"
        letter-spacing="1.5">c/o BRAZIL</text>

  <!-- TM -->
  <text x="205" y="36"
        font-family="Arial,Helvetica,sans-serif"
        font-size="7"
        fill="#f5f4f0"
        opacity="0.25">™</text>
</svg>
