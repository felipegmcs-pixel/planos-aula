<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>
  <!-- Fundo quadrado arredondado com gradiente azul -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bg-grad)"/>
  <!-- Borda sutil -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <!-- Logo Minimalista Ancestral em branco, centralizada -->
  <g transform="translate(8, 8) scale(0.5)" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 30 80 A 40 40 0 1 1 70 80" />
    <circle cx="50" cy="45" r="4" fill="white" />
    <path d="M 50 49 L 50 65" />
    <path d="M 40 75 Q 50 60 60 75" />
  </g>
</svg>
