<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .fav-circle { stroke: #1E40AF; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .fav-point { fill: #1E40AF; }
    @media (prefers-color-scheme: dark) {
      .fav-circle { stroke: #FFFFFF; }
      .fav-point { fill: #FFFFFF; }
    }
  </style>
  <!-- Dois círculos entrelaçados (Vesica Piscis) otimizado para favicon -->
  <circle class="fav-circle" cx="22" cy="32" r="13" />
  <circle class="fav-circle" cx="42" cy="32" r="13" />
  <!-- Ponto central sólido na intersecção -->
  <circle class="fav-point" cx="32" cy="32" r="2" />
</svg>
