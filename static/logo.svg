<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .logo-circle { stroke: #1E40AF; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .logo-point { fill: #1E40AF; }
    @media (prefers-color-scheme: dark) {
      .logo-circle { stroke: #FFFFFF; }
      .logo-point { fill: #FFFFFF; }
    }
  </style>
  <!-- Dois círculos entrelaçados (Vesica Piscis) -->
  <circle class="logo-circle" cx="35" cy="50" r="20" />
  <circle class="logo-circle" cx="65" cy="50" r="20" />
  <!-- Ponto central sólido na intersecção -->
  <circle class="logo-point" cx="50" cy="50" r="3" />
</svg>
