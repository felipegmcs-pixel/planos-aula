<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Deep ancient lapis: wisdom, permanence -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>
    <!-- Amber warmth radiating from the child held within -->
    <radialGradient id="warm" cx="50%" cy="57%" r="45%">
      <stop offset="0%"   stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle white glow on the embrace arc -->
    <filter id="arcGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: ancient stone, rounded -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Her love: amber warmth at the heart of the embrace -->
  <circle cx="32" cy="36" r="22" fill="url(#warm)"/>

  <!--
    The embrace: a 340° arc — almost complete, open at the top.
    Center (32, 36), r=18.
    Opening at top: 10° from the vertical on each side.
      Left endpoint:  (32 - 18·sin10°, 36 - 18·cos10°) ≈ (29, 18)
      Right endpoint: (32 + 18·sin10°, 36 - 18·cos10°) ≈ (35, 18)
    The arc goes the long way around (clockwise through the bottom) — large-arc=1, sweep=1.
    This is the universal ancient gesture of a mother's arms wrapping her child.
  -->
  <path d="M 29 18 A 18 18 0 1 1 35 18"
        stroke="white" stroke-width="2.8" stroke-linecap="round"
        fill="none" opacity="0.90" filter="url(#arcGlow)"/>

  <!-- Subtle inner echo: the space of protection held within the embrace -->
  <circle cx="32" cy="36" r="11" stroke="white" stroke-width="0.6"
          opacity="0.12" fill="none"/>

  <!-- The child — amber life cradled at the center -->
  <circle cx="32" cy="36" r="6.5" fill="#f59e0b"/>
  <!-- The soul within: white light -->
  <circle cx="32" cy="36" r="3"   fill="white" opacity="0.94"/>
  <!-- The spark of consciousness -->
  <circle cx="32" cy="36" r="1.1" fill="#fbbf24" opacity="0.85"/>
</svg>
