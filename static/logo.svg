<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="15" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="64" height="32" rx="15" fill="url(#shine)"/>

  <!-- Letter P — stem -->
  <rect x="13" y="12" width="9" height="40" rx="4.5" fill="white"/>

  <!-- Letter P — bowl outer -->
  <path d="M22 12 L37 12 Q50 12 50 25 Q50 38 37 38 L22 38 Z" fill="white"/>
  <!-- Letter P — bowl inner cutout (gradient color to punch hole) -->
  <path d="M22 18 L35 18 Q44 18 44 25 Q44 32 35 32 L22 32 Z" fill="url(#bg)"/>

  <!-- Amber accent dot — bottom right corner -->
  <circle cx="50" cy="50" r="8" fill="#f59e0b"/>
  <!-- Dot inner glint -->
  <circle cx="48" cy="48" r="3" fill="white" opacity="0.35"/>
</svg>
