<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Deep midnight blue — não roxo, azul escuro puro -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07101f"/>
      <stop offset="100%" stop-color="#030912"/>
    </linearGradient>
    <!-- Glow coral do filho -->
    <radialGradient id="glow" cx="70%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <!--
      Máscara para criar o crescente:
      círculo externo (mãe) MENOS círculo interno deslocado = lua crescente
    -->
    <mask id="cres">
      <rect width="64" height="64" fill="white"/>
      <circle cx="37" cy="32" r="16" fill="black"/>
    </mask>
  </defs>

  <!-- Fundo: azul meia-noite profundo -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Luz do filho irradiando para o universo -->
  <circle cx="44" cy="32" r="20" fill="url(#glow)"/>

  <!--
    A mãe: crescente lunar — símbolo da deusa-mãe em TODAS as civilizações antigas.
    Mesopotâmia (Inanna/Ishtar), Egito (Ísis), Grécia (Selene/Ártemis),
    Roma, Babilônia, Suméria — a lua sempre representou a mãe que protege.
    O crescente "abraça" o filho em seu colo côncavo.
  -->
  <circle cx="27" cy="32" r="20" fill="#f97316" opacity="0.93" mask="url(#cres)"/>

  <!--
    O filho: ponto de luz no colo do crescente.
    Precioso, protegido, iluminado.
  -->
  <circle cx="44" cy="32" r="6" fill="#fef4e4"/>
  <circle cx="44" cy="32" r="3" fill="white"/>
</svg>
