<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ titulo }} — ProfessorIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --preto: #0a0a0a; --branco: #f5f4f0; --amarelo: #f0e000; --cinza: #888880; --linha: rgba(245,244,240,0.08); --verde: #34d399; --vermelho: #fca5a5; }
    body { font-family: 'Inter', sans-serif; background: var(--preto); color: var(--branco); min-height: 100vh; display: flex; flex-direction: column; }
    ::selection { background: var(--amarelo); color: var(--preto); }

    nav { padding: 0 40px; height: 56px; display: flex; align-items: center; border-bottom: 1px solid var(--linha); background: rgba(10,10,10,0.95); }
    .nav-logo { font-size: 0.72rem; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; color: var(--branco); text-decoration: none; display: flex; align-items: center; gap: 10px; }
    .nav-logo .tm { font-size: 0.5rem; vertical-align: super; opacity: 0.4; font-weight: 400; }

    .container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; position: relative; overflow: hidden; }
    .container::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(245,244,240,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(245,244,240,0.03) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }

    .box { width: 100%; max-width: 480px; text-align: center; position: relative; z-index: 1; }

    .status-mark {
      width: 64px; height: 64px; margin: 0 auto 32px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; font-weight: 900;
      border: 1px solid;
    }
    .mark-sucesso { border-color: rgba(52,211,153,0.4); color: var(--verde); background: rgba(52,211,153,0.06); }
    .mark-pendente { border-color: rgba(240,224,0,0.4); color: var(--amarelo); background: rgba(240,224,0,0.06); }
    .mark-falha { border-color: rgba(239,68,68,0.4); color: var(--vermelho); background: rgba(239,68,68,0.06); }

    .status-num { font-size: 0.55rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--cinza); margin-bottom: 20px; }

    h1 { font-size: clamp(2rem, 5vw, 3rem); font-weight: 900; letter-spacing: -2px; text-transform: uppercase; line-height: 1; margin-bottom: 16px; }

    .mensagem { font-size: 0.82rem; color: var(--cinza); line-height: 1.8; margin-bottom: 40px; max-width: 360px; margin-left: auto; margin-right: auto; }

    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 32px; background: var(--branco); color: var(--preto); border: none; font-size: 0.65rem; font-weight: 900; font-family: 'Inter', sans-serif; letter-spacing: 3px; text-transform: uppercase; text-decoration: none; cursor: pointer; transition: background .2s; }
    .btn:hover { background: var(--amarelo); }

    .diag { position: fixed; inset: 0; pointer-events: none; }
    .diag svg { width: 100%; height: 100%; opacity: 0.04; }
  </style>
</head>
<body>

<div class="diag">
  <svg viewBox="0 0 100 100" preserveAspectRatio="none">
    <line x1="0" y1="100" x2="100" y2="0" stroke="#f5f4f0" stroke-width="0.3"/>
  </svg>
</div>

<nav>
  <a class="nav-logo" href="/">
    PROFESSOR<span class="tm">IA™</span>
  </a>
</nav>

<div class="container">
  <div class="box">
    {% if status == 'sucesso' %}
      <div class="status-mark mark-sucesso">✓</div>
      <div class="status-num">PAGAMENTO CONFIRMADO</div>
    {% elif status == 'pendente' %}
      <div class="status-mark mark-pendente">⏱</div>
      <div class="status-num">AGUARDANDO CONFIRMAÇÃO</div>
    {% else %}
      <div class="status-mark mark-falha">✕</div>
      <div class="status-num">PAGAMENTO NÃO REALIZADO</div>
    {% endif %}

    <h1>{{ titulo }}</h1>
    <p class="mensagem">{{ mensagem }}</p>
    <a href="/chat" class="btn">IR PARA O CHAT →</a>
  </div>
</div>
</body>
</html>
