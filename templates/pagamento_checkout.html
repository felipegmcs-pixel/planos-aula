<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pagamento — Plano de Aula IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://sdk.mercadopago.com/js/v2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --preto: #0a0a0a; --branco: #ffffff; --cinza-100: #f5f5f5; --cinza-200: #e2e2e2; --cinza-400: #a0a0a0; --cinza-600: #555555; --azul: #2b4fc7; --linha: #e2e2e2; --verde: #059669; --vermelho: #dc2626; }
    body { font-family: 'Inter', sans-serif; background: var(--branco); color: var(--preto); min-height: 100vh; }
    .top-bar { height: 3px; background: var(--azul); }
    nav { padding: 0 40px; height: 60px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--linha); }
    .nav-logo { font-weight: 800; font-size: 0.92rem; letter-spacing: .5px; text-transform: uppercase; color: var(--preto); text-decoration: none; }
    .nav-logo span { color: var(--azul); }
    .nav-link { font-size: 0.82rem; font-weight: 500; color: var(--cinza-600); text-decoration: none; }
    .container { max-width: 520px; margin: 0 auto; padding: 56px 24px 100px; }
    .titulo { font-size: 1.6rem; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; margin-bottom: 4px; }
    .subtitulo { font-size: 0.82rem; color: var(--cinza-600); margin-bottom: 32px; }
    .resumo { border: 1px solid var(--linha); padding: 20px 24px; margin-bottom: 32px; display: flex; justify-content: space-between; align-items: center; }
    .resumo-nome { font-size: 0.78rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--cinza-600); }
    .resumo-preco { font-size: 1.4rem; font-weight: 900; letter-spacing: -1px; }
    .resumo-preco small { font-size: 0.75rem; font-weight: 500; color: var(--cinza-400); }
    #cardPaymentBrick_container { margin-bottom: 24px; }
    .msg { padding: 14px 16px; font-size: 0.82rem; font-weight: 600; display: none; margin-bottom: 16px; }
    .msg.erro { background: #fef2f2; border: 1px solid #fecaca; color: var(--vermelho); display: flex; }
    .msg.sucesso { background: #ecfdf5; border: 1px solid #a7f3d0; color: var(--verde); display: flex; }
    .voltar { font-size: 0.78rem; color: var(--cinza-400); text-decoration: none; display: inline-block; margin-top: 16px; }
    .voltar:hover { color: var(--preto); }
    @media (max-width: 600px) { nav { padding: 0 20px; } }
  </style>
</head>
<body>
<div class="top-bar"></div>
<nav>
  <a class="nav-logo" href="/">Plano de Aula <span>IA</span></a>
  <a class="nav-link" href="/planos">← Voltar</a>
</nav>

<div class="container">
  <div class="titulo">Pagamento</div>
  <div class="subtitulo">Preencha os dados do cartão para ativar sua conta.</div>

  <div class="resumo">
    <div>
      <div class="resumo-nome">Plano {{ plano.nome }}</div>
      <div style="font-size:0.75rem;color:var(--cinza-400);margin-top:2px;">Acesso por 30 dias</div>
    </div>
    <div class="resumo-preco">R$ {{ "%.0f"|format(plano.preco) }}<small>/mês</small></div>
  </div>

  <div id="msg-erro" class="msg erro"></div>
  <div id="msg-sucesso" class="msg sucesso">Pagamento aprovado! Redirecionando...</div>

  <div id="cardPaymentBrick_container"></div>

  <a class="voltar" href="/planos">← Voltar para planos</a>
</div>

<script>
  const mp = new MercadoPago('{{ public_key }}', { locale: 'pt-BR' });
  const bricksBuilder = mp.bricks();

  bricksBuilder.create('cardPayment', 'cardPaymentBrick_container', {
    initialization: {
      amount: {{ plano.preco }},
      payer: { email: '{{ usuario_email }}' }
    },
    customization: {
      visual: { hideFormTitle: true },
      paymentMethods: { minInstallments: 1, maxInstallments: 12 }
    },
    callbacks: {
      onReady: () => {},
      onError: (err) => {
        console.error(err);
      },
      onSubmit: async (formData) => {
        document.getElementById('msg-erro').style.display = 'none';
        try {
          const res = await fetch('/pagamento/processar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ...formData, plano_id: '{{ plano_id }}' })
          });
          const result = await res.json();

          if (result.status === 'approved') {
            document.getElementById('msg-sucesso').style.display = 'flex';
            setTimeout(() => { window.location.href = '/pagamento/sucesso'; }, 1500);
          } else {
            const el = document.getElementById('msg-erro');
            el.textContent = 'Pagamento recusado: ' + (result.detail || 'tente outro cartão.');
            el.style.display = 'flex';
          }
        } catch (e) {
          const el = document.getElementById('msg-erro');
          el.textContent = 'Erro de conexão. Tente novamente.';
          el.style.display = 'flex';
        }
      }
    }
  });
</script>
</body>
</html>
