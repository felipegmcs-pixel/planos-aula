<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="color-scheme" content="only light"/>
  <script>document.documentElement.setAttribute('data-theme','light');document.documentElement.style.colorScheme='only light';</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Página não encontrada · ProfessorIA™</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --preto: #0a0a0a; --branco: #ffffff; --azul-academico: #1E40AF; --cinza: #666660; --linha: rgba(0,0,0,0.09); }
    html, body { height: 100%; }
    body { font-family: 'Inter', sans-serif; background: var(--branco); color: var(--preto); display: flex; flex-direction: column; }
    ::selection { background: var(--azul-academico); color: var(--preto); }

    nav {
      padding: 0 40px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--linha);
      background: rgba(255,255,255,0.97);
    }
    .nav-logo { font-size: 0.7rem; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; color: var(--preto); text-decoration: none; }
    .nav-logo .tm { font-size: 0.45rem; vertical-align: super; opacity: 0.4; font-weight: 400; }

    .main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 60px 40px;
    }
    .inner { max-width: 560px; width: 100%; }
    .code {
      font-size: clamp(6rem, 18vw, 12rem); font-weight: 900;
      letter-spacing: -8px; line-height: 1;
      color: var(--preto); margin-bottom: 8px;
    }
    .code span { color: var(--azul-academico); }
    .tag { font-size: 0.52rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--cinza); margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
    .tag::after { content: ''; flex: 1; max-width: 32px; height: 1px; background: var(--cinza); opacity: .4; }
    .msg { font-size: clamp(1.4rem, 4vw, 2.2rem); font-weight: 900; letter-spacing: -1.5px; text-transform: uppercase; line-height: 1.05; margin-bottom: 16px; }
    .desc { font-size: 0.78rem; color: var(--cinza); line-height: 1.8; margin-bottom: 40px; }
    .btn {
      display: inline-block; padding: 14px 32px;
      background: var(--preto); color: #fff;
      font-size: 0.62rem; font-weight: 900;
      font-family: 'Inter', sans-serif; letter-spacing: 2.5px;
      text-transform: uppercase; text-decoration: none;
      transition: background .2s;
    }
    .btn:hover { background: var(--azul-academico); color: var(--preto); }
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/">PROFESSOR<span class="tm">IA™</span></a>
</nav>
<div class="main">
  <div class="inner">
    <div class="code">4<span>0</span>4</div>
    <div class="tag">ERRO — PÁGINA NÃO ENCONTRADA</div>
    <h1 class="msg">ESSA PÁGINA<br/>NÃO EXISTE.</h1>
    <p class="desc">A página que você procura foi removida, não existe ou o endereço está errado.</p>
    <a href="/" class="btn">VOLTAR PARA O INÍCIO →</a>
  </div>
</div>
</body>
</html>
