<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Histórico — Plano de Aula IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --azul: #2b4fc7;
      --azul-escuro: #1a3399;
      --azul-claro: #f0f4ff;
      --azul-mid: #e0e8ff;
      --texto: #1a1a2e;
      --cinza: #6b7280;
      --borda: #e5e7eb;
      --branco: #ffffff;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8eeff 100%);
      min-height: 100vh;
      color: var(--texto);
    }

    nav {
      background: var(--branco);
      border-bottom: 1px solid var(--borda);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(43,79,199,.08);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--azul);
      text-decoration: none;
    }

    .nav-logo span { font-size: 1.3rem; }

    nav a.nav-link {
      font-size: 0.87rem;
      font-weight: 500;
      color: var(--cinza);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 8px;
      transition: all .2s;
    }

    nav a.nav-link:hover, nav a.nav-link.ativo {
      background: var(--azul-claro);
      color: var(--azul);
    }

    .page-header {
      padding: 40px 16px 24px;
      text-align: center;
    }

    .page-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--texto);
      margin-bottom: 6px;
    }

    .page-header p { color: var(--cinza); font-size: 0.9rem; }

    .container { max-width: 820px; margin: 0 auto; padding: 0 16px 60px; }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--branco);
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(43,79,199,.06);
      border: 1px solid rgba(43,79,199,.06);
    }

    .stat-num {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--azul);
      display: block;
    }

    .stat-label {
      font-size: 0.78rem;
      color: var(--cinza);
      margin-top: 3px;
    }

    /* Busca */
    .busca-bar {
      background: var(--branco);
      border-radius: 12px;
      padding: 14px 18px;
      box-shadow: 0 2px 12px rgba(43,79,199,.06);
      margin-bottom: 18px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .busca-bar input {
      flex: 1;
      border: 1.5px solid var(--borda);
      border-radius: 8px;
      padding: 9px 13px;
      font-size: 0.88rem;
      font-family: 'Inter', sans-serif;
      color: var(--texto);
      background: #fafbff;
      outline: none;
      transition: border-color .2s;
    }

    .busca-bar input:focus { border-color: var(--azul); }
    .busca-bar input::placeholder { color: #b0b8cc; }

    /* Lista */
    .lista { display: flex; flex-direction: column; gap: 12px; }

    .item-card {
      background: var(--branco);
      border-radius: 14px;
      padding: 20px 22px;
      box-shadow: 0 2px 12px rgba(43,79,199,.06);
      border: 1px solid rgba(43,79,199,.06);
      display: flex;
      gap: 16px;
      align-items: flex-start;
      transition: box-shadow .2s, transform .15s;
    }

    .item-card:hover {
      box-shadow: 0 4px 20px rgba(43,79,199,.12);
      transform: translateY(-1px);
    }

    .item-icon {
      width: 42px;
      height: 42px;
      background: var(--azul-claro);
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .item-body { flex: 1; min-width: 0; }

    .item-titulo {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--texto);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-meta {
      font-size: 0.78rem;
      color: var(--cinza);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 8px;
    }

    .item-meta span {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .item-temas {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-size: 0.72rem;
      font-weight: 500;
      background: var(--azul-claro);
      color: var(--azul);
      padding: 3px 10px;
      border-radius: 20px;
    }

    .item-acoes {
      display: flex;
      flex-direction: column;
      gap: 7px;
      flex-shrink: 0;
    }

    .btn-baixar {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--azul);
      color: white;
      border: none;
      border-radius: 9px;
      padding: 8px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition: background .2s;
    }

    .btn-baixar:hover { background: var(--azul-escuro); }

    .btn-del {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 9px;
      padding: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background .2s;
    }

    .btn-del:hover { background: #fee2e2; }

    /* Vazio */
    .vazio {
      text-align: center;
      padding: 60px 20px;
      color: var(--cinza);
    }

    .vazio-icon { font-size: 3rem; margin-bottom: 12px; }
    .vazio h3 { font-size: 1rem; font-weight: 600; margin-bottom: 6px; color: var(--texto); }
    .vazio p { font-size: 0.87rem; }

    .btn-novo {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--azul);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 0.88rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      text-decoration: none;
      margin-top: 16px;
      transition: background .2s;
    }

    .btn-novo:hover { background: var(--azul-escuro); }

    .loading-estado {
      text-align: center;
      padding: 40px;
      color: var(--cinza);
    }

    @media (max-width: 600px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .item-acoes { flex-direction: row; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <span>📚</span> Plano de Aula IA
  </a>
  <a class="nav-link ativo" href="/historico">Histórico</a>
</nav>

<div class="page-header">
  <h1>Histórico de Planos</h1>
  <p>Todos os planos gerados — baixe novamente a qualquer momento</p>
</div>

<div class="container">

  <div class="stats">
    <div class="stat-card">
      <span class="stat-num" id="stat-total">—</span>
      <div class="stat-label">Planos gerados</div>
    </div>
    <div class="stat-card">
      <span class="stat-num" id="stat-disc">—</span>
      <div class="stat-label">Disciplinas diferentes</div>
    </div>
    <div class="stat-card">
      <span class="stat-num" id="stat-aulas">—</span>
      <div class="stat-label">Total de aulas planejadas</div>
    </div>
  </div>

  <div class="busca-bar">
    <input type="text" id="busca" placeholder="Buscar por disciplina, turma ou professor..."/>
  </div>

  <div id="conteudo" class="loading-estado">Carregando...</div>

</div>

<script>
  let todos = [];

  async function carregar() {
    try {
      const res = await fetch('/api/historico');
      todos = await res.json();
      renderStats();
      renderLista(todos);
    } catch(e) {
      document.getElementById('conteudo').innerHTML = '<p>Erro ao carregar histórico.</p>';
    }
  }

  function renderStats() {
    document.getElementById('stat-total').textContent = todos.length;
    const discs = new Set(todos.map(i => i.disciplina).filter(Boolean));
    document.getElementById('stat-disc').textContent = discs.size;
    const totalAulas = todos.reduce((s, i) => s + (parseInt(i.num_aulas) || 0), 0);
    document.getElementById('stat-aulas').textContent = totalAulas;
  }

  function renderLista(lista) {
    const el = document.getElementById('conteudo');
    if (!lista.length) {
      el.innerHTML = `
        <div class="vazio">
          <div class="vazio-icon">📋</div>
          <h3>Nenhum plano encontrado</h3>
          <p>Os planos gerados aparecerão aqui.</p>
          <a class="btn-novo" href="/">+ Gerar novo plano</a>
        </div>`;
      return;
    }

    el.innerHTML = '<div class="lista">' + lista.map(item => `
      <div class="item-card" id="item-${item.id}">
        <div class="item-icon">📄</div>
        <div class="item-body">
          <div class="item-titulo">${item.disciplina || '—'} — ${item.turma || '—'}</div>
          <div class="item-meta">
            ${item.professor ? `<span>👩‍🏫 ${item.professor}</span>` : ''}
            ${item.escola ? `<span>🏫 ${item.escola}</span>` : ''}
            <span>📅 ${item.data || '—'}</span>
            <span>📖 ${item.num_aulas} aula${item.num_aulas != 1 ? 's' : ''}</span>
            ${item.datas ? `<span>🗓 ${item.datas}</span>` : ''}
          </div>
          ${item.temas && item.temas.length ? `
            <div class="item-temas">
              ${item.temas.slice(0, 4).map(t => `<span class="tag">${t}</span>`).join('')}
              ${item.temas.length > 4 ? `<span class="tag">+${item.temas.length - 4}</span>` : ''}
            </div>` : ''}
        </div>
        <div class="item-acoes">
          <a class="btn-baixar" href="/download/${item.id}">
            ⬇ Baixar
          </a>
          <button class="btn-del" onclick="deletar(${item.id})" title="Excluir">🗑</button>
        </div>
      </div>
    `).join('') + '</div>';
  }

  async function deletar(id) {
    if (!confirm('Excluir este plano do histórico?')) return;
    await fetch(`/deletar/${id}`, { method: 'DELETE' });
    todos = todos.filter(i => i.id !== id);
    renderStats();
    renderLista(filtrar());
  }

  function filtrar() {
    const q = document.getElementById('busca').value.toLowerCase();
    if (!q) return todos;
    return todos.filter(i =>
      (i.disciplina || '').toLowerCase().includes(q) ||
      (i.turma || '').toLowerCase().includes(q) ||
      (i.professor || '').toLowerCase().includes(q) ||
      (i.escola || '').toLowerCase().includes(q)
    );
  }

  document.getElementById('busca').addEventListener('input', () => {
    renderLista(filtrar());
  });

  carregar();
</script>
</body>
</html>
