<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Histórico — Plano de Aula IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --preto: #0a0a0a;
      --branco: #ffffff;
      --cinza-100: #f5f5f5;
      --cinza-200: #e2e2e2;
      --cinza-400: #a0a0a0;
      --cinza-600: #555555;
      --azul: #2b4fc7;
      --linha: #e2e2e2;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--branco);
      color: var(--preto);
      min-height: 100vh;
    }

    .top-bar {
      height: 3px;
      background: var(--azul);
    }

    nav {
      padding: 0 40px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--linha);
      position: sticky;
      top: 0;
      background: var(--branco);
      z-index: 100;
    }

    .nav-logo {
      font-weight: 800;
      font-size: 0.92rem;
      letter-spacing: .5px;
      text-transform: uppercase;
      color: var(--preto);
      text-decoration: none;
    }

    .nav-logo span { color: var(--azul); }

    .nav-link {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--preto);
      text-decoration: none;
      letter-spacing: .3px;
    }

    /* ── Header ── */
    .page-header {
      padding: 64px 40px 48px;
      border-bottom: 1px solid var(--linha);
      max-width: 900px;
      margin: 0 auto;
    }

    .page-header-tag {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--azul);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .page-header-tag::after {
      content: '';
      display: block;
      height: 1px;
      width: 40px;
      background: var(--azul);
    }

    .page-header h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      letter-spacing: -1.5px;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 12px;
    }

    .page-header p {
      font-size: 0.9rem;
      color: var(--cinza-600);
      line-height: 1.6;
    }

    /* ── Container ── */
    .container { max-width: 900px; margin: 0 auto; padding: 0 40px 100px; }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 1px solid var(--linha);
      margin-top: 0;
    }

    .stat-card {
      padding: 36px 0;
      border-right: 1px solid var(--linha);
    }

    .stat-card:last-child { border-right: none; }

    .stat-num {
      display: block;
      font-size: 3rem;
      font-weight: 900;
      color: var(--preto);
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .stat-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--cinza-400);
    }

    /* ── Busca ── */
    .busca-wrap {
      padding: 24px 0;
      border-bottom: 1px solid var(--linha);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .busca-wrap input {
      flex: 1;
      border: none;
      font-size: 0.92rem;
      font-family: 'Inter', sans-serif;
      color: var(--preto);
      background: transparent;
      outline: none;
    }

    .busca-wrap input::placeholder { color: var(--cinza-400); }

    .busca-icon {
      font-size: 0.9rem;
      color: var(--cinza-400);
      flex-shrink: 0;
    }

    /* ── Lista ── */
    .lista { display: flex; flex-direction: column; }

    .item-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: center;
      padding: 24px 0;
      border-bottom: 1px solid var(--linha);
      transition: background .15s;
    }

    .item-card:hover { background: var(--cinza-100); margin: 0 -20px; padding: 24px 20px; }

    .item-titulo {
      font-size: 1rem;
      font-weight: 700;
      color: var(--preto);
      margin-bottom: 6px;
      letter-spacing: -.2px;
    }

    .item-meta {
      font-size: 0.76rem;
      color: var(--cinza-400);
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 10px;
    }

    .item-temas {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
      background: var(--cinza-100);
      color: var(--cinza-600);
      padding: 3px 10px;
      border: 1px solid var(--cinza-200);
    }

    .item-acoes {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .btn-baixar {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--preto);
      color: var(--branco);
      border: none;
      padding: 10px 20px;
      font-size: 0.78rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: background .2s;
      white-space: nowrap;
    }

    .btn-baixar:hover { background: var(--azul); }

    .btn-del {
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: 1px solid var(--cinza-200);
      width: 36px;
      height: 36px;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--cinza-400);
      transition: all .2s;
    }

    .btn-del:hover { border-color: #dc2626; color: #dc2626; }

    /* ── Vazio ── */
    .vazio {
      padding: 80px 0;
      border-bottom: 1px solid var(--linha);
    }

    .vazio-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cinza-400);
      margin-bottom: 16px;
    }

    .vazio h3 {
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: -1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .vazio p {
      font-size: 0.88rem;
      color: var(--cinza-600);
      margin-bottom: 24px;
    }

    .btn-novo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--preto);
      color: var(--branco);
      border: none;
      padding: 13px 28px;
      font-size: 0.82rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: background .2s;
    }

    .btn-novo:hover { background: var(--azul); }

    .loading-estado {
      padding: 60px 0;
      font-size: 0.88rem;
      color: var(--cinza-400);
      letter-spacing: .5px;
    }

    @media (max-width: 700px) {
      nav { padding: 0 20px; }
      .page-header { padding: 40px 20px 32px; }
      .container { padding: 0 20px 80px; }
      .stats { grid-template-columns: 1fr 1fr; }
      .stat-card:nth-child(3) { grid-column: 1 / -1; border-right: none; }
      .item-card { grid-template-columns: 1fr; }
      .item-acoes { flex-direction: row; }
    }
  </style>
</head>
<body>

<div class="top-bar"></div>

<nav>
  <a class="nav-logo" href="/">Plano de Aula <span>IA</span></a>
  <a class="nav-link" href="/historico">Histórico</a>
</nav>

<div class="page-header">
  <div class="page-header-tag">Seus planos</div>
  <h1>Histórico</h1>
  <p>Todos os planos gerados — baixe novamente a qualquer momento.</p>
</div>

<div class="container">

  <div class="stats">
    <div class="stat-card">
      <span class="stat-num" id="stat-total">—</span>
      <div class="stat-label">Planos gerados</div>
    </div>
    <div class="stat-card" style="padding-left: 32px;">
      <span class="stat-num" id="stat-disc">—</span>
      <div class="stat-label">Disciplinas</div>
    </div>
    <div class="stat-card" style="padding-left: 32px;">
      <span class="stat-num" id="stat-aulas">—</span>
      <div class="stat-label">Aulas planejadas</div>
    </div>
  </div>

  <div class="busca-wrap">
    <span class="busca-icon">→</span>
    <input type="text" id="busca" placeholder="Buscar por disciplina, turma ou professor..."/>
  </div>

  <div id="conteudo" class="loading-estado">Carregando...</div>

</div>

<script>
  let todos = [];

  async function carregar() {
    try {
      const res = await fetch('/api/historico');
      todos = await res.json();
      renderStats();
      renderLista(todos);
    } catch(e) {
      document.getElementById('conteudo').innerHTML = '<p style="padding:40px 0; color:#a0a0a0;">Erro ao carregar histórico.</p>';
    }
  }

  function renderStats() {
    document.getElementById('stat-total').textContent = todos.length;
    const discs = new Set(todos.map(i => i.disciplina).filter(Boolean));
    document.getElementById('stat-disc').textContent = discs.size;
    const totalAulas = todos.reduce((s, i) => s + (parseInt(i.num_aulas) || 0), 0);
    document.getElementById('stat-aulas').textContent = totalAulas;
  }

  function renderLista(lista) {
    const el = document.getElementById('conteudo');
    if (!lista.length) {
      el.innerHTML = `
        <div class="vazio">
          <div class="vazio-label">Sem resultados</div>
          <h3>Nenhum plano<br>encontrado.</h3>
          <p>Os planos gerados aparecerão aqui.</p>
          <a class="btn-novo" href="/">Gerar novo plano →</a>
        </div>`;
      return;
    }

    el.innerHTML = '<div class="lista">' + lista.map(item => `
      <div class="item-card" id="item-${item.id}">
        <div class="item-body">
          <div class="item-titulo">${item.disciplina || '—'} — ${item.turma || '—'}</div>
          <div class="item-meta">
            ${item.professor ? `<span>${item.professor}</span>` : ''}
            ${item.escola ? `<span>${item.escola}</span>` : ''}
            <span>${item.data || '—'}</span>
            <span>${item.num_aulas} aula${item.num_aulas != 1 ? 's' : ''}</span>
            ${item.datas ? `<span>${item.datas}</span>` : ''}
          </div>
          ${item.temas && item.temas.length ? `
            <div class="item-temas">
              ${item.temas.slice(0, 4).map(t => `<span class="tag">${t}</span>`).join('')}
              ${item.temas.length > 4 ? `<span class="tag">+${item.temas.length - 4}</span>` : ''}
            </div>` : ''}
        </div>
        <div class="item-acoes">
          <a class="btn-baixar" href="/download/${item.id}">↓ Baixar</a>
          <button class="btn-del" onclick="deletar(${item.id})" title="Excluir">×</button>
        </div>
      </div>
    `).join('') + '</div>';
  }

  async function deletar(id) {
    if (!confirm('Excluir este plano do histórico?')) return;
    await fetch(`/deletar/${id}`, { method: 'DELETE' });
    todos = todos.filter(i => i.id !== id);
    renderStats();
    renderLista(filtrar());
  }

  function filtrar() {
    const q = document.getElementById('busca').value.toLowerCase();
    if (!q) return todos;
    return todos.filter(i =>
      (i.disciplina || '').toLowerCase().includes(q) ||
      (i.turma || '').toLowerCase().includes(q) ||
      (i.professor || '').toLowerCase().includes(q) ||
      (i.escola || '').toLowerCase().includes(q)
    );
  }

  document.getElementById('busca').addEventListener('input', () => {
    renderLista(filtrar());
  });

  carregar();
</script>
</body>
</html>
