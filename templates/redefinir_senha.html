<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova Senha — ProfessorIA</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo-oficial.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#FFFFFA;--text:#1A2F33;--text2:#4A6470;--text3:#7A9499;--indigo:#1E5A63;--violet:#164A52;--amber:#D4AF37;--line:rgba(30,90,99,.08);--line2:rgba(30,90,99,.16);--hero:#0D2327;--r:10px}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    ::selection{background:#ede9fe;color:var(--indigo)}
    nav{height:60px;padding:0 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);flex-shrink:0}
    .logo{text-decoration:none;display:flex;align-items:center;gap:2px}
    .logo-p{font-size:1rem;font-weight:800;color:var(--text);letter-spacing:-.3px}
    .logo-ia{font-size:1rem;font-weight:600;letter-spacing:-.3px;color:#D4AF37}
    
    .nav-r{font-size:.875rem;font-weight:600;color:var(--text2);text-decoration:none;transition:color .2s}
    .nav-r:hover{color:var(--text)}
    .page{flex:1;display:flex}
    .left{width:420px;flex-shrink:0;background:var(--hero);padding:56px 48px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
    .left-glow{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 60% at 40% 40%,rgba(30,90,99,.30) 0%,transparent 65%),radial-gradient(ellipse 50% 50% at 80% 75%,rgba(212,175,55,.10) 0%,transparent 60%)}
    .left-cube{position:absolute;right:-30px;top:50%;transform:translateY(-50%);perspective:900px;pointer-events:none;opacity:.1;z-index:0}
    .left>*{position:relative;z-index:1}
    .left-tag{font-size:.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:40px}
    .left-h{font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:900;letter-spacing:-1.5px;line-height:1.05;color:#fff;margin-bottom:18px}
    .left-h .grad{background:linear-gradient(135deg,#D4AF37,#F0C84A);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .left-desc{font-size:.9rem;color:rgba(255,255,255,.4);line-height:1.75}
    .left-bottom{font-size:.7rem;font-weight:600;letter-spacing:1.5px;color:rgba(255,255,255,.18)}
    .cube-wrap{perspective:800px;display:flex;align-items:center;justify-content:center}
    .cube{transform-style:preserve-3d;animation:cspin 20s linear infinite;width:130px;height:130px}
    .c-face{position:absolute;width:130px;height:130px;border:1.5px solid rgba(30,90,99,.5)}
    .c-face:nth-child(1){transform:translateZ(65px)}
    .c-face:nth-child(2){transform:rotateY(180deg) translateZ(65px)}
    .c-face:nth-child(3){transform:rotateY(-90deg) translateZ(65px)}
    .c-face:nth-child(4){transform:rotateY(90deg) translateZ(65px)}
    .c-face:nth-child(5){transform:rotateX(90deg) translateZ(65px)}
    .c-face:nth-child(6){transform:rotateX(-90deg) translateZ(65px)}
    @keyframes cspin{from{transform:rotateX(18deg) rotateY(0)}to{transform:rotateX(18deg) rotateY(360deg)}}
    .right{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 40px}
    .box{width:100%;max-width:380px}
    .box-step{font-size:.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--indigo);margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .box-step::before{content:'';width:16px;height:2px;background:var(--indigo);border-radius:2px}
    h1{font-size:clamp(2rem,5vw,2.6rem);font-weight:900;letter-spacing:-1.5px;line-height:1.05;color:var(--text);margin-bottom:36px}
    .alert{padding:12px 16px;font-size:.82rem;font-weight:600;border-radius:var(--r);margin-bottom:24px}
    .alert-erro{background:rgba(185,28,28,.06);border:1px solid rgba(185,28,28,.2);color:#991b1b}
    .alert-ok{background:rgba(5,150,105,.06);border:1px solid rgba(5,150,105,.2);color:#065f46}
    .field{margin-bottom:24px}
    label{font-size:.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);display:block;margin-bottom:8px}
    input[type=password]{width:100%;padding:11px 14px;border:1.5px solid var(--line2);border-radius:var(--r);font-size:.95rem;font-family:'Inter',sans-serif;font-weight:400;color:var(--text);background:var(--bg);transition:border-color .2s,box-shadow .2s;outline:none}
    input:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(30,90,99,.1)}
    input::placeholder{color:var(--text3);font-weight:400}
    .btn{width:100%;padding:13px;background:linear-gradient(135deg,#1E5A63,#164A52);color:#FFFFFA;border:none;font-size:.9rem;font-weight:700;font-family:'Inter',sans-serif;border-radius:var(--r);cursor:pointer;transition:opacity .2s,transform .2s;margin-top:8px;box-shadow:0 4px 18px rgba(30,90,99,.3)}
    .btn:hover{opacity:.9;transform:translateY(-1px)}
    .links{margin-top:24px;padding-top:24px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;font-size:.82rem}
    .link-label{color:var(--text2);font-weight:500}
    .link-a{color:var(--indigo);font-weight:700;text-decoration:none;transition:opacity .2s}
    .link-a:hover{opacity:.75}
    @media(max-width:700px){.left{display:none}.right{padding:40px 24px}}
  </style>
  <!-- Meta Pixel Code -->
  <script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', '2080536069265217');
  fbq('track', 'PageView');
  </script>
  <noscript><img height="1" width="1" style="display:none"
  src="https://www.facebook.com/tr?id=2080536069265217&ev=PageView&noscript=1"
  /></noscript>
  <!-- End Meta Pixel Code -->
</head>
<body>
<nav>
  <a class="logo" href="/">
    <img src="{{ url_for('static', filename='logo-oficial.png') }}" alt="ProfessorIA" style="height: 32px; width: auto; flex-shrink: 0;">
    <span class="logo-p">Professor</span><span class="logo-ia">IA</span>
    
  </a>
  <a class="nav-r" href="/login">Entrar →</a>
</nav>

<div class="page">
  <div class="left">
    <div class="left-glow"></div>
    <div class="left-cube">
      <div class="cube-wrap">
        <div class="cube">
          <div class="c-face"></div><div class="c-face"></div>
          <div class="c-face"></div><div class="c-face"></div>
          <div class="c-face"></div><div class="c-face"></div>
        </div>
      </div>
    </div>
    <div>
      <div class="left-tag">Nova senha</div>
      <div class="left-h">Crie uma<br/><span class="grad">nova senha</span><br/>segura.</div>
      <p class="left-desc">Escolha uma senha forte com pelo menos 6 caracteres para proteger sua conta.</p>
    </div>
    <div class="left-bottom">© 2026 ProfessorIA</div>
  </div>

  <div class="right">
    <div class="box">
      <div class="box-step">Redefinir acesso</div>
      <h1>Nova<br/>senha</h1>

      {% for cat, msg in get_flashed_messages(with_categories=true) %}
        <template data-toast data-cat="{{ cat }}" data-msg="{{ msg }}"></template>
      {% endfor %}

      <form method="POST" id="redefinirForm">
        <div class="field">
          <label>Nova senha</label>
          <input type="password" name="senha" placeholder="Mínimo 6 caracteres" required autofocus/>
        </div>
        <div class="field">
          <label>Confirmar senha</label>
          <input type="password" name="confirma" placeholder="Repita a senha" required/>
        </div>
        <button type="submit" class="btn" id="redefinirBtn">Salvar nova senha →</button>
      </form>

      <div class="links">
        <span class="link-label">Voltar para</span>
        <a class="link-a" href="/login">Entrar →</a>
      </div>
    </div>
  </div>
</div>
<script src="/static/toast.js"></script>
<script>
  document.getElementById('redefinirForm').addEventListener('submit', function () {
    var btn = document.getElementById('redefinirBtn');
    btn.classList.add('btn-loading');
    btn.disabled = true;
    setTimeout(function () { btn.classList.remove('btn-loading'); btn.disabled = false; }, 8000);
  });
</script>
</body>
</html>
